name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # Compute the next version from commit messages (conventional commits:
  # fix/feat/BREAKING CHANGE -> patch/minor/major; defaults to patch).
  # Dry run so nothing is tagged until every build succeeds.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.new_tag }}
      changelog: ${{ steps.version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          dry_run: true

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
            native: aarch64-apple-darwin
          - os: windows-latest
            targets: x86_64-pc-windows-msvc
            native: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Stamp Cargo.toml with release version
        run: |
          perl -pi -e 's/^version = ".*"$/version = "${{ needs.version.outputs.version }}"/ if !$done++' Cargo.toml
          grep -m1 '^version' Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          IFS=',' read -ra targets <<< "${{ matrix.targets }}"
          for target in "${targets[@]}"; do
            cargo build --release --target "$target"
          done

      - name: Smoke test
        run: |
          bin="target/${{ matrix.native }}/release/dingdong-ditch"
          "$bin" --version
          "$bin" --fart --preview smoke.wav

      - name: Package
        run: |
          mkdir dist
          version="${{ needs.version.outputs.version }}"
          IFS=',' read -ra targets <<< "${{ matrix.targets }}"
          for target in "${targets[@]}"; do
            case "$target" in
              *windows*)
                (cd "target/$target/release" && 7z a "$GITHUB_WORKSPACE/dist/dingdong-ditch-$version-$target.zip" dingdong-ditch.exe)
                ;;
              *)
                tar -C "target/$target/release" -czf "dist/dingdong-ditch-$version-$target.tar.gz" dingdong-ditch
                ;;
            esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.version.outputs.version }}
          tag_prefix: v

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: ${{ needs.version.outputs.changelog }}
          files: |
            dist/*
